name: Retrieve GloBFP for AOI

# Runs on a GitHub-hosted runner (which has outbound internet to figshare), so it
# can actually download the 3D-GloBFP tiles, crop them to the AOI, and write the
# cropped buildings as GeoJSON + OSM (uploaded as an artifact and committed back
# gzipped).

on:
  push:
    branches: ["claude/cool-newton-Szorb"]
  workflow_dispatch:
    inputs:
      aoi:
        description: "Path to the AOI file in the repo"
        default: "examples/nanjing_subdistricts.geojson"
        required: false

permissions:
  contents: write

jobs:
  retrieve:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      AOI: ${{ github.event.inputs.aoi || 'examples/nanjing_subdistricts.geojson' }}
      STEM: nanjing_buildings
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: List intersecting tiles
        run: globfp-retriever "$AOI" --cache-dir .globfp-cache --list-tiles -v

      - name: Retrieve and crop (GeoJSON + OSM)
        run: |
          mkdir -p output
          globfp-retriever "$AOI" --cache-dir .globfp-cache -o "output/${STEM}.geojson" -v
          globfp-retriever "$AOI" --cache-dir .globfp-cache -o "output/${STEM}.osm" -v

      - name: Output summary
        if: always()
        run: ls -lh output || echo "no output directory produced"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nanjing-globfp
          path: output/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit gzipped outputs back to the branch
        if: success()
        run: |
          mkdir -p outputs
          gzip -n -9 -c "output/${STEM}.geojson" > "outputs/${STEM}.geojson.gz"
          gzip -n -9 -c "output/${STEM}.osm" > "outputs/${STEM}.osm.gz"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "outputs/${STEM}.geojson.gz" "outputs/${STEM}.osm.gz"
          if git diff --staged --quiet; then
            echo "No output changes to commit"
          else
            git commit -m "Add Nanjing GloBFP output (GeoJSON + OSM, gzipped) [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
