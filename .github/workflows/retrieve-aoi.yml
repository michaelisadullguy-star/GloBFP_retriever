name: Retrieve GloBFP for AOI

# Runs on a GitHub-hosted runner (which has outbound internet to figshare), so it
# can actually download the 3D-GloBFP tiles, crop them to the AOI, and write the
# cropped buildings as GeoJSON + OSM. Results are uploaded as an artifact and
# published on an ephemeral orphan ref that this run deletes again itself;
# nothing is committed to any persistent branch.

on:
  push:
    branches: ["claude/gifted-ride-vdrhct"]
  workflow_dispatch:
    inputs:
      aoi:
        description: "Path to the AOI file in the repo"
        default: "examples/gaochun_subdistricts.geojson"
        required: false

permissions:
  contents: write

jobs:
  retrieve:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      AOI: ${{ github.event.inputs.aoi || 'examples/gaochun_subdistricts.geojson' }}
      STEM: gaochun_buildings
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: List intersecting tiles
        run: globfp-retriever "$AOI" --cache-dir .globfp-cache --list-tiles -v

      - name: Retrieve and crop (GeoJSON + OSM)
        run: |
          mkdir -p output
          globfp-retriever "$AOI" --cache-dir .globfp-cache -o "output/${STEM}.geojson" -v
          globfp-retriever "$AOI" --cache-dir .globfp-cache -o "output/${STEM}.osm" -v

      - name: Output summary
        if: always()
        run: ls -lh output || echo "no output directory produced"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gaochun-globfp
          path: output/
          if-no-files-found: warn
          retention-days: 14

      # Sandboxed clients can reach this repo only through git, so park the
      # gzipped outputs on an orphan ref (no parent history, outputs only) just
      # long enough to be fetched, then delete the ref from this same run.
      - name: Publish outputs on an ephemeral delivery ref (self-deleting)
        if: success()
        run: |
          for ext in geojson osm; do
            gzip -n -9 -c "output/${STEM}.${ext}" > "output/${STEM}.${ext}.gz"
          done
          sha256sum output/*.gz | tee output/SHA256SUMS
          REF="refs/heads/claude/tmp-delivery-${GITHUB_RUN_ID}"
          REMOTE="https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git"
          DIR=$(mktemp -d)
          cp output/*.gz output/SHA256SUMS "$DIR"/
          git -C "$DIR" init -q -b delivery
          git -C "$DIR" -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              add -A
          git -C "$DIR" -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -qm "Ephemeral output delivery for run ${GITHUB_RUN_ID}"
          git -C "$DIR" push -q "$REMOTE" "HEAD:${REF}"
          echo "Delivery ref ${REF} pushed; deleting it in 240s"
          sleep 240
          git -C "$DIR" push -q "$REMOTE" ":${REF}"
          echo "Delivery ref ${REF} deleted"
