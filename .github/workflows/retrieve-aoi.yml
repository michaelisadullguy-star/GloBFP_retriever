name: Retrieve GloBFP for AOI

# Runs on a GitHub-hosted runner (which has outbound internet to figshare), so it
# can actually download the 3D-GloBFP tiles, crop them to the AOI, and upload the
# cropped buildings as a downloadable artifact.

on:
  push:
    branches: ["claude/cool-newton-Szorb"]
    paths-ignore:
      - "outputs/**"
  workflow_dispatch:
    inputs:
      aoi:
        description: "Path to the AOI file in the repo"
        default: "examples/dongshan_nanjing.geojson"
        required: false

permissions:
  contents: write

jobs:
  retrieve:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      AOI: ${{ github.event.inputs.aoi || 'examples/dongshan_nanjing.geojson' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Probe figshare API (sanity-check naming)
        run: |
          python - <<'PY'
          from globfp_retriever import metadata as M
          files = M.fetch_article_files(M.FIGSHARE_ARTICLES[0])
          print("file count in first article:", len(files))
          for f in files[:5]:
              print({k: f.get(k) for k in ("id", "name", "size", "download_url")})
          PY

      - name: List intersecting tiles
        run: globfp-retrieve "$AOI" --cache-dir .globfp-cache --list-tiles -v

      - name: Retrieve and crop (GeoJSON + GPKG)
        run: |
          python scripts/run_aoi.py "$AOI" \
            --cache-dir .globfp-cache \
            --outdir output \
            --stem dongshan_buildings

      - name: Output summary
        if: always()
        run: ls -lh output || echo "no output directory produced"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dongshan-globfp
          path: output/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit GPKG output back to the branch
        if: success()
        run: |
          mkdir -p outputs
          cp output/dongshan_buildings.gpkg outputs/dongshan_buildings.gpkg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # outputs/*.gpkg is gitignored, so force-add the deliverable.
          git add -f outputs/dongshan_buildings.gpkg
          if git diff --staged --quiet; then
            echo "No output changes to commit"
          else
            git commit -m "Add Dongshan GloBFP output (GPKG, 32k buildings) [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
