name: Retrieve GloBFP for AOI

# Retrieval needs outbound HTTPS to api.figshare.com / ndownloader.figshare.com,
# which some environments block. This workflow runs the CLI on a GitHub-hosted
# runner (which has internet) and uploads the cropped result as a build
# artifact; nothing is committed to the repository.

on:
  workflow_dispatch:
    inputs:
      aoi:
        description: "AOI: repo path to a boundary file (.shp/.geojson/.json) or a WKT polygon"
        required: false
        type: string
      bbox:
        description: "AOI bounding box: min_lon min_lat max_lon max_lat (WGS84)"
        required: false
        type: string
      format:
        description: "Output format"
        required: false
        default: "geojson"
        type: choice
        options: [geojson, gpkg, shp, fgb, parquet, obj, osm]
      clip:
        description: "Clip buildings to the AOI boundary"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  retrieve:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Retrieve and crop
        env:
          AOI: ${{ inputs.aoi }}
          BBOX: ${{ inputs.bbox }}
          FORMAT: ${{ inputs.format }}
          CLIP: ${{ inputs.clip }}
        run: |
          if [ -z "$AOI" ] && [ -z "$BBOX" ]; then
            echo "Provide either the 'aoi' input (file path or WKT) or the 'bbox' input." >&2
            exit 1
          fi
          mkdir -p output
          args=(--cache-dir .globfp-cache -f "$FORMAT" -o "output/buildings.$FORMAT" -v)
          if [ "$CLIP" = "true" ]; then
            args+=(--clip)
          fi
          if [ -n "$AOI" ]; then
            globfp-retriever "$AOI" "${args[@]}"
          else
            globfp-retriever --bbox $BBOX "${args[@]}"
          fi

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: globfp-aoi-output
          path: output/
          retention-days: 14
