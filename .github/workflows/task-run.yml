name: Task run (filters + shp/osm/obj)

# One-off task runner: retrieves the committed AOI on a GitHub runner (which can
# reach figshare), with ALL cleaning filters on, in three formats, and commits
# the packaged outputs back so they can be collected. Triggered only by changes
# to this file or the task AOI, so ordinary pushes don't re-run it.

on:
  push:
    branches: ["claude/cool-newton-Szorb"]
    paths:
      - ".github/workflows/task-run.yml"
      - "examples/task_aoi.geojson"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Retrieve with all filters in shp / osm / obj
        run: |
          set -e
          mkdir -p output
          AOI=examples/task_aoi.geojson
          FILTERS="--min-area 10 --drop-duplicates --drop-triangles"
          for FMT in shp osm obj; do
            globfp-retriever "$AOI" --cache-dir .globfp-cache $FILTERS -f "$FMT" -o "output/buildings.$FMT" -v
          done
          ls -lh output

      - name: Package and commit outputs
        if: success()
        run: |
          set -e
          mkdir -p outputs
          (cd output && zip -q ../outputs/buildings_shp.zip buildings.shp buildings.shx buildings.dbf buildings.prj buildings.cpg) || true
          gzip -nc output/buildings.osm > outputs/buildings.osm.gz
          gzip -nc output/buildings.obj > outputs/buildings.obj.gz
          ls -lh outputs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f outputs/buildings_shp.zip outputs/buildings.osm.gz outputs/buildings.obj.gz
          if git diff --staged --quiet; then
            echo "No output changes to commit"
          else
            git commit -m "Task outputs: Gaochun 5-subdistrict AOI, all filters, shp/osm/obj [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
